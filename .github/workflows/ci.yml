name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ---------------------------------------------------------------------------
  # Job 1 — Native g++ build and test
  # Tests platform-agnostic core: MIDITransport, MIDIHandlerConfig, MIDI2Support.
  # No Arduino/ESP32 toolchain required — runs in < 30 s.
  # ---------------------------------------------------------------------------
  native-test:
    name: Native g++ — core logic
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build native test binary
        run: |
          g++ -std=c++11 \
              -Iextras/tests/stub \
              -Isrc \
              -Wall -Wextra -Wno-unused-parameter -Wno-comment \
              -o extras/tests/test_native extras/tests/test_native.cpp

      - name: Run native tests
        run: ./extras/tests/test_native

      - name: Build MIDIHandler test binary
        run: |
          g++ -std=c++17 \
              -Iextras/tests/stub \
              -Isrc \
              -Wall -Wextra -Wno-unused-parameter -Wno-comment \
              -DESP32_HOST_MIDI_NO_USB_HOST \
              -o extras/tests/test_handler extras/tests/test_handler.cpp src/MIDIHandler.cpp

      - name: Run MIDIHandler tests
        run: ./extras/tests/test_handler

      - name: Build MIDI2 scan test binary
        run: |
          g++ -std=c++11 \
              -Iextras/tests/stub \
              -Isrc \
              -Wall -Wextra -Wno-unused-parameter -Wno-comment \
              -o extras/tests/test_midi2_scan extras/tests/test_midi2_scan.cpp

      - name: Run MIDI2 scan tests
        run: ./extras/tests/test_midi2_scan

  # ---------------------------------------------------------------------------
  # Job 2 — Arduino compile check (ESP32-S3)
  # Verifies the library compiles with the real ESP32 Arduino toolchain.
  # Uses the simplest example (UART-only, no external display libraries).
  # ---------------------------------------------------------------------------
  arduino-compile:
    name: Arduino compile — ESP32-S3
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: arduino/compile-sketches@v1
        with:
          fqbn: 'esp32:esp32:esp32s3'
          platforms: |
            - name: esp32:esp32
              source-url: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          libraries: |
            - source-path: ./
          sketch-paths: |
            - examples/P4-Dual-UART-MIDI
